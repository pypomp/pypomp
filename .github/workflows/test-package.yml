# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_call:
    inputs:
      run-heavy:
        description: 'Whether to run heavy tests'
        required: false
        type: boolean
        default: false
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  build:

    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]  # Currently doesn't work on "pypy3.10" due to dependencies.
        exclude:
          # On regular push/PR, only test 3.12 and 3.14; all versions run on workflow_call (version bump via publish.yml).
          - python-version: ${{ (github.event_name != 'workflow_call') && '3.10' || '' }}
          - python-version: ${{ (github.event_name != 'workflow_call') && '3.11' || '' }}
          - python-version: ${{ (github.event_name != 'workflow_call') && '3.13' || '' }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    - name: Display Python version
      run: python -c "import sys; print(sys.version)"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-cov pytest-xdist
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        python -m pip install -e .[benchmarks,viz]
#    - name: Lint with flake8
#       run: |
#         # stop the build if there are Python syntax errors or undefined names
#         flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
#         # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
#         flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test with pytest
      env:
        RUN_HEAVY: ${{ inputs.run-heavy }}
      run: |
        if [ "$RUN_HEAVY" = "true" ]; then
          pytest --cov --junitxml=junit.xml -o junit_family=legacy
        else
          pytest -m "not heavy" --cov --junitxml=junit.xml -o junit_family=legacy
        fi

    - name: Upload results to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
