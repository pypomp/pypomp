name: Ruff compliance

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check formatting with Ruff
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check
